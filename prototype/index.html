<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuizTok · Login</title>
<link rel="stylesheet" href="css/styles.css">
<style>
  .wrap {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 40px 24px; gap: 60px; flex-wrap: wrap;
  }

  /* ----- Hero side ----- */
  .hero { max-width: 520px; }
  .hero .abc-tag { display: flex; align-items: center; gap: 12px; margin-bottom: 26px; }
  .hero .abc-tag span { font-size: 13px; font-weight: 600; color: var(--text-dim); letter-spacing: 2.5px; text-transform: uppercase; }
  .hero h1 { font-size: 74px; line-height: 1.02; }
  .hero h1 .brand { font-size: inherit; }
  .hero .arc {
    display: block; width: 190px; height: 26px; margin: 4px 0 18px 4px;
  }
  .hero p.sub { font-size: 18px; color: var(--text-dim); line-height: 1.65; margin-bottom: 30px; }
  .hero p.sub b { color: var(--text); }

  .badges { display: flex; gap: 14px; flex-wrap: wrap; }
  .badge {
    display: flex; align-items: center; gap: 10px;
    background: var(--glass); border: 1px solid var(--stroke);
    border-radius: 16px; padding: 12px 18px; font-size: 14px; font-weight: 600;
    animation: bounce 3.4s ease-in-out infinite;
  }
  .badge:nth-child(2) { animation-delay: 0.5s; }
  .badge:nth-child(3) { animation-delay: 1s; }
  .badge .ico { font-size: 22px; }

  /* ----- Mascot ----- */
  .mascot {
    position: absolute; top: -46px; right: -20px;
    width: 92px; height: 92px; border-radius: 28px;
    background: linear-gradient(135deg, var(--abc-red), #ff6b81);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Baloo 2', cursive; font-size: 52px; font-weight: 800; color: #fff;
    box-shadow: 0 18px 40px rgba(226, 24, 54, 0.45);
    animation: mascotFloat 3s ease-in-out infinite;
    transform: rotate(8deg); z-index: 2;
  }
  @keyframes mascotFloat {
    0%, 100% { transform: rotate(8deg) translateY(0); }
    50% { transform: rotate(-4deg) translateY(-14px); }
  }

  /* ----- Login card ----- */
  .login-card { position: relative; width: 430px; padding: 40px 38px 34px; }
  .tabs {
    display: flex; background: rgba(0, 0, 0, 0.3); border-radius: 999px;
    padding: 5px; margin-bottom: 30px; position: relative;
  }
  .tabs .slider {
    position: absolute; top: 5px; bottom: 5px; left: 5px; width: calc(50% - 5px);
    background: linear-gradient(135deg, var(--abc-blue), var(--abc-navy));
    border-radius: 999px; transition: transform 0.35s cubic-bezier(0.34, 1.4, 0.64, 1);
    box-shadow: 0 6px 18px rgba(0, 136, 206, 0.4);
  }
  .tabs.admin .slider { transform: translateX(100%); background: linear-gradient(135deg, #ff415e, var(--abc-red)); box-shadow: 0 6px 18px rgba(226, 24, 54, 0.4); }
  .tabs button {
    flex: 1; z-index: 1; background: none; border: none; cursor: pointer;
    font-family: 'Poppins', sans-serif; font-weight: 700; font-size: 15px;
    color: var(--text-dim); padding: 12px; border-radius: 999px; transition: color 0.25s;
  }
  .tabs button.active { color: #fff; }

  .pane { display: none; flex-direction: column; gap: 18px; }
  .pane.show { display: flex; animation: rise 0.45s cubic-bezier(0.22, 1, 0.36, 1) both; }

  .pin-input input {
    text-align: center; font-family: 'Baloo 2', cursive; font-size: 30px !important;
    letter-spacing: 10px; font-weight: 700;
  }
  .hint { font-size: 12.5px; color: var(--text-dim); text-align: center; }
  .hint a { color: var(--abc-sky); text-decoration: none; font-weight: 600; }

  .login-card .glow-ring {
    position: absolute; inset: -2px; border-radius: var(--radius); z-index: -1;
    background: linear-gradient(135deg, rgba(77,180,255,0.5), transparent 40%, rgba(226,24,54,0.4));
    filter: blur(14px); opacity: 0.6; animation: glowSpin 6s linear infinite;
  }
  @keyframes glowSpin { 50% { opacity: 0.25; } }
</style>
</head>
<body>

<div class="orbs"><div class="orb o1"></div><div class="orb o2"></div><div class="orb o3"></div></div>
<div class="floaters" id="floaters"></div>

<div class="wrap">

  <!-- HERO -->
  <div class="hero rise">
    <div class="abc-tag">
      <svg viewBox="0 0 300 195" width="72" height="47" style="vertical-align:middle" aria-label="abc"><g transform="matrix(2.4760713,0,0,2.4760713,-2.9521334,-2.9521466)"><path d="m38.400442,64.214842-0.213828,0.206921c-3.446638,3.511502-7.435859,5.372563-11.546423,5.372563-8.580217,0-14.808582-6.436766-14.808582-15.318118,0-8.86532,6.228365-15.311212,14.808582-15.311212,4.110564,0,8.099785,1.868707,11.546423,5.38958l0.213828,0.213088,5.518073-6.672297-0.147484-0.181026c-4.589023-5.422875-10.095258-8.06279-16.86448-8.06279-6.792652,0-13.002027,2.286003-17.4771072,6.408651-4.8622878,4.464475-7.4294475,10.760663-7.4294475,18.216006,0,7.451645,2.5671597,13.76337,7.4294475,18.229079,4.4750802,4.141638,10.6844552,6.415063,17.4771072,6.415063,6.769222,0,12.275457-2.638436,16.86448-8.063531l0.147484-0.168447-5.518073-6.67353z" fill-rule="nonzero" fill="#ffffff"/><path d="m49.494547,78.212262,9.748252,0,0-47.58753-9.748252,0,0,47.58753z" fill-rule="nonzero" fill="#ffffff"/><path d="m97.427357,67.864702c-2.600701,1.583604-5.021116,2.379722-7.194656,2.379722-3.149451,0-4.572746-1.662278-4.572746-5.364917v-25.250109h9.928044v-8.961259h-9.928044v-14.807103l-9.554648,5.113356v9.693747h-8.242583v8.961259h8.242583v26.860842c0,7.318218,4.334995,12.317631,10.806043,12.447604,4.393939,0.08607,7.042733-1.222785,8.651493-2.179705l0.09421-0.07004,2.346921-9.17558-0.576619,0.352186z" fill-rule="nonzero" fill="#ffffff"/><path d="m105.50125,78.212262,9.75466,0,0-47.58753-9.75466,0,0,47.58753z" fill-rule="nonzero" fill="#ffffff"/><path d="M121.09485,22.1809c-8.92353-12.6397281-23.742961-20.1808984-38.820616-20.1808984-15.071489,0-29.893883,7.5411703-38.80261,20.1808984l-0.457003,0.650361h11.235917l0.124547-0.134906c7.647468-7.89311,17.63051-12.067303,27.899149-12.067303,10.269872,0,20.250946,4.174193,27.913206,12.067303l0.1243,0.134906h11.23247l-0.44936-0.650361z" fill-rule="evenodd" fill="#d9261c"/></g></svg>
      <span>· <span style="color:#4db4ff">QuizTok</span> · Team Engagement Arena</span>
    </div>

    <h1>Play. Learn.<br><span class="brand">QuizTok</span> it!</h1>
    <svg class="arc" viewBox="0 0 190 26"><path d="M8 22 Q 95 -14 182 22" stroke="#e21836" stroke-width="7" fill="none" stroke-linecap="round"/></svg>

    <p class="sub">The <b>funkiest way</b> to quiz with your team — live battles, streaks,
    power-ups and podium glory. Built with 💙 for <b>ABC Company teams</b>.</p>

    <div class="badges rise d3">
      <div class="badge"><span class="ico">⚡</span> Live Battles</div>
      <div class="badge"><span class="ico">🔥</span> Streak Bonuses</div>
      <div class="badge"><span class="ico">🏆</span> Team Podiums</div>
    </div>
  </div>

  <!-- LOGIN CARD -->
  <div class="card login-card rise d2">
    <div class="glow-ring"></div>
    <div class="mascot">?</div>

    <div class="tabs" id="tabs">
      <div class="slider"></div>
      <button class="active" id="tabPlayer" onclick="switchTab('player')">🎮 Participant</button>
      <button id="tabAdmin" onclick="switchTab('admin')">🛠️ Admin</button>
    </div>

    <!-- Participant pane -->
    <form class="pane show" id="panePlayer" onsubmit="joinGame(event)">
      <div class="field pin-input">
        <label>GAME PIN</label>
        <input id="pin" maxlength="6" placeholder="••••••" autocomplete="off">
      </div>
      <div class="field">
        <label>YOUR NICKNAME</label>
        <input id="nick" placeholder="e.g. QuizNinja_Rahul" autocomplete="off">
      </div>
      <button class="btn big" type="submit">Join the Fun 🚀</button>
    </form>

    <!-- Admin pane -->
    <form class="pane" id="paneAdmin" onsubmit="adminLogin(event)">
      <div class="field">
        <label>ABC EMAIL (SSO)</label>
        <input type="email" id="email" placeholder="you@abc.com">
      </div>
      <div class="field">
        <label>PASSWORD</label>
        <input type="password" id="pwd" placeholder="••••••••">
      </div>
      <button class="btn red big" type="submit">Enter Command Center 🎛️</button>
      <div class="hint">Single Sign-On enabled · <a href="#">Use ABC Company SSO instead</a></div>
    </form>
  </div>
</div>

<script>
  // floating background symbols
  const syms = ['?', '!', '★', '▲', '●', '◆', '?', '♦'];
  const f = document.getElementById('floaters');
  for (let i = 0; i < 14; i++) {
    const s = document.createElement('span');
    s.className = 'floater';
    s.textContent = syms[i % syms.length];
    s.style.left = (Math.random() * 100) + 'vw';
    s.style.animationDelay = (Math.random() * -14) + 's';
    s.style.animationDuration = (10 + Math.random() * 10) + 's';
    s.style.fontSize = (16 + Math.random() * 26) + 'px';
    f.appendChild(s);
  }

  function switchTab(t) {
    const tabs = document.getElementById('tabs');
    tabs.classList.toggle('admin', t === 'admin');
    document.getElementById('tabPlayer').classList.toggle('active', t === 'player');
    document.getElementById('tabAdmin').classList.toggle('active', t === 'admin');
    document.getElementById('panePlayer').classList.toggle('show', t === 'player');
    document.getElementById('paneAdmin').classList.toggle('show', t === 'admin');
  }

  function joinGame(e) {
    e.preventDefault();
    const pin = document.getElementById('pin');
    const nick = document.getElementById('nick');
    if (pin.value.trim().length < 4) { pin.style.animation = 'shake 0.4s'; setTimeout(() => pin.style.animation = '', 450); pin.focus(); return; }
    if (!nick.value.trim()) { nick.style.animation = 'shake 0.4s'; setTimeout(() => nick.style.animation = '', 450); nick.focus(); return; }
    sessionStorage.setItem('qt_nick', nick.value.trim());
    sessionStorage.setItem('qt_pin', pin.value.trim());
    window.location.href = 'lobby.html';
  }

  function adminLogin(e) {
    e.preventDefault();
    window.location.href = 'admin.html';
  }
</script>
<script src='ink.js'></script>
</body>
</html>
