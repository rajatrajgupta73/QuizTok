<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuizTok · Leaderboard</title>
<link rel="stylesheet" href="css/styles.css">
<style>
  .lb-wrap { max-width: 940px; margin: 0 auto; padding: 30px 24px 60px; }
  .lb-wrap h1 { font-family: 'Baloo 2', cursive; font-size: 42px; text-align: center; margin-bottom: 6px; }
  .lb-wrap .sub { text-align: center; color: var(--text-dim); margin-bottom: 44px; }
  .lb-wrap .sub b { color: var(--abc-sky); }

  /* ---- podium ---- */
  .podium { display: flex; align-items: flex-end; justify-content: center; gap: 20px; margin-bottom: 48px; }
  .step { text-align: center; width: 170px; }
  .step .avatar {
    width: 76px; height: 76px; font-size: 38px; margin: 0 auto 10px;
    border-width: 3px; animation: bounce 2.8s ease-in-out infinite;
  }
  .step .who { font-weight: 700; font-size: 16px; margin-bottom: 2px; }
  .step .pts { font-family: 'Baloo 2', cursive; color: var(--gold); font-weight: 800; font-size: 18px; margin-bottom: 10px; }
  .step .block {
    border-radius: 18px 18px 0 0; position: relative;
    display: flex; align-items: flex-start; justify-content: center; padding-top: 14px;
    font-family: 'Baloo 2', cursive; font-size: 40px; font-weight: 800; color: rgba(255,255,255,0.85);
    animation: growUp 1s cubic-bezier(0.22,1,0.36,1) both;
    transform-origin: bottom;
  }
  @keyframes growUp { from { transform: scaleY(0); } to { transform: scaleY(1); } }
  .step.first .block  { height: 190px; background: linear-gradient(180deg, #ffd76e, #b8860b); animation-delay: 0.9s; box-shadow: 0 0 50px rgba(255,194,51,0.35); }
  .step.second .block { height: 140px; background: linear-gradient(180deg, #b9d4f0, #5f7d9c); animation-delay: 0.5s; }
  .step.third .block  { height: 105px; background: linear-gradient(180deg, #e8a06b, #9c5a2e); animation-delay: 0.2s; }
  .step .crown { font-size: 34px; display: block; animation: bounce 1.6s ease-in-out infinite; }
  .step .meta { animation: rise 0.6s both; }
  .step.third .meta { animation-delay: 0.5s; } .step.second .meta { animation-delay: 0.9s; } .step.first .meta { animation-delay: 1.4s; }

  /* ---- ranks list ---- */
  .ranks { display: flex; flex-direction: column; gap: 12px; }
  .row {
    display: flex; align-items: center; gap: 16px; padding: 14px 22px;
    animation: rise 0.55s cubic-bezier(0.22,1,0.36,1) both;
  }
  .row .rk { font-family: 'Baloo 2', cursive; font-size: 20px; font-weight: 800; width: 40px; color: var(--text-dim); }
  .row .em { font-size: 26px; width: 46px; height: 46px; border-radius: 50%; background: rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center; }
  .row .nm { font-weight: 700; font-size: 16.5px; flex: 1; }
  .row .delta { font-size: 13px; font-weight: 700; padding: 4px 12px; border-radius: 999px; }
  .row .delta.up { color: var(--teal); background: rgba(0,201,167,0.12); }
  .row .delta.down { color: #ff7b8d; background: rgba(226,24,54,0.12); }
  .row .pt { font-family: 'Baloo 2', cursive; font-weight: 800; font-size: 19px; color: var(--gold); width: 90px; text-align: right; }
  .row.me {
    border: 1.5px solid rgba(77,180,255,0.5);
    background: linear-gradient(135deg, rgba(0,136,206,0.22), rgba(0,59,112,0.28));
    animation: rise 0.55s both, glowPulse 2.4s 1s ease-in-out infinite;
  }
  .row.me .nm::after { content: ' — YOU'; color: var(--abc-sky); font-size: 12px; letter-spacing: 1px; }

  .next-cta { text-align: center; margin-top: 40px; display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
</style>
</head>
<body>

<div class="orbs"><div class="orb o1"></div><div class="orb o2"></div><div class="orb o3"></div></div>

<div class="topbar">
  <div class="left">
    <span class="brand">QuizTok</span>
    <div class="divider"></div>
    <svg viewBox="0 0 300 195" width="52" height="34" style="vertical-align:middle" aria-label="abc"><g transform="matrix(2.4760713,0,0,2.4760713,-2.9521334,-2.9521466)"><path d="m38.400442,64.214842-0.213828,0.206921c-3.446638,3.511502-7.435859,5.372563-11.546423,5.372563-8.580217,0-14.808582-6.436766-14.808582-15.318118,0-8.86532,6.228365-15.311212,14.808582-15.311212,4.110564,0,8.099785,1.868707,11.546423,5.38958l0.213828,0.213088,5.518073-6.672297-0.147484-0.181026c-4.589023-5.422875-10.095258-8.06279-16.86448-8.06279-6.792652,0-13.002027,2.286003-17.4771072,6.408651-4.8622878,4.464475-7.4294475,10.760663-7.4294475,18.216006,0,7.451645,2.5671597,13.76337,7.4294475,18.229079,4.4750802,4.141638,10.6844552,6.415063,17.4771072,6.415063,6.769222,0,12.275457-2.638436,16.86448-8.063531l0.147484-0.168447-5.518073-6.67353z" fill-rule="nonzero" fill="#ffffff"/><path d="m49.494547,78.212262,9.748252,0,0-47.58753-9.748252,0,0,47.58753z" fill-rule="nonzero" fill="#ffffff"/><path d="m97.427357,67.864702c-2.600701,1.583604-5.021116,2.379722-7.194656,2.379722-3.149451,0-4.572746-1.662278-4.572746-5.364917v-25.250109h9.928044v-8.961259h-9.928044v-14.807103l-9.554648,5.113356v9.693747h-8.242583v8.961259h8.242583v26.860842c0,7.318218,4.334995,12.317631,10.806043,12.447604,4.393939,0.08607,7.042733-1.222785,8.651493-2.179705l0.09421-0.07004,2.346921-9.17558-0.576619,0.352186z" fill-rule="nonzero" fill="#ffffff"/><path d="m105.50125,78.212262,9.75466,0,0-47.58753-9.75466,0,0,47.58753z" fill-rule="nonzero" fill="#ffffff"/><path d="M121.09485,22.1809c-8.92353-12.6397281-23.742961-20.1808984-38.820616-20.1808984-15.071489,0-29.893883,7.5411703-38.80261,20.1808984l-0.457003,0.650361h11.235917l0.124547-0.134906c7.647468-7.89311,17.63051-12.067303,27.899149-12.067303,10.269872,0,20.250946,4.174193,27.913206,12.067303l0.1243,0.134906h11.23247l-0.44936-0.650361z" fill-rule="evenodd" fill="#d9261c"/></g></svg>
  </div>
  <div class="right"><span class="pill">Round 3 of 10</span><span class="pill"><span class="dot"></span> LIVE</span></div>
</div>

<div class="lb-wrap">
  <h1 class="rise">🏆 Leaderboard</h1>
  <div class="sub rise d1">after <b>Q3</b> · next round starts automatically…</div>

  <div class="podium">
    <div class="step second">
      <div class="meta">
        <div class="avatar">🐼</div>
        <div class="who">Priya P.</div>
        <div class="pts">2,910</div>
      </div>
      <div class="block">2</div>
    </div>
    <div class="step first">
      <div class="meta">
        <span class="crown">👑</span>
        <div class="avatar">🦄</div>
        <div class="who">Sneha ✨</div>
        <div class="pts">3,180</div>
      </div>
      <div class="block">1</div>
    </div>
    <div class="step third">
      <div class="meta">
        <div class="avatar">🦊</div>
        <div class="who" id="meName">QuizNinja</div>
        <div class="pts">3,080</div>
      </div>
      <div class="block">3</div>
    </div>
  </div>

  <div class="ranks" id="ranks"></div>

  <div class="next-cta rise d5">
    <a class="btn big" href="quiz.html">Next Question ▶</a>
    <a class="btn gold big" href="results.html">Skip to Finale 🎉</a>
  </div>
</div>

<script>
  const rows = [
    [4, '🐙', 'Octo-Ops', '2,740', 'up', '+2'],
    [5, '🦁', 'Arjun_Roars', '2,590', 'down', '-1'],
    [6, '🐸', 'KermitTheDev', '2,320', 'up', '+1'],
    [7, '🦉', 'NightOwl_Sam', '2,100', 'down', '-2'],
    [8, '🐯', 'TigerTeam_Vik', '1,880', 'up', '+3'],
    [9, '🐨', 'ChillKarthik', '1,545', 'down', '-1'],
    [10, '🦖', 'RexOfRisk', '1,290', 'down', '-1'],
  ];
  const ranks = document.getElementById('ranks');
  rows.forEach(([rk, em, nm, pt, dir, d], i) => {
    const el = document.createElement('div');
    el.className = 'card row';
    el.style.animationDelay = (1.6 + i * 0.12) + 's';
    el.innerHTML = `<span class="rk">#${rk}</span><span class="em">${em}</span>
      <span class="nm">${nm}</span>
      <span class="delta ${dir}">${dir === 'up' ? '▲' : '▼'} ${d}</span>
      <span class="pt">${pt}</span>`;
    ranks.appendChild(el);
  });
  const nick = sessionStorage.getItem('qt_nick');
  if (nick) document.getElementById('meName').textContent = nick;
</script>
<script src='ink.js'></script>
</body>
</html>
